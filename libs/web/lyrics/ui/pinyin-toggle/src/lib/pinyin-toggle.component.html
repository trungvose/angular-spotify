<button
  *ngIf="showToggle$ | async"
  nz-tooltip
  [nzTooltipTitle]="(downloadState$ | async) === 'downloading' ? 'Preparing pinyin…' : 'Show pinyin'"
  class="pinyin-toggle-btn"
  [class.active]="isEnabled$ | async"
  (click)="toggle()"
>
  <svg-icon [key]="'pinyin'" [fontSize]="'18px'"></svg-icon>
</button>
